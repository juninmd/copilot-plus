name: Auto Tag Main Commits

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'

jobs:
  auto-tag:
    name: Create semver tag on main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VSIX package
        run: pnpm exec vsce package --no-dependencies --out copilot-plus.vsix

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine tag from package.json
        id: tag
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          next="v${pkg_version}"
          echo "package.json version: ${pkg_version} → tag: ${next}"
          if git tag --list "$next" | grep -q "^${next}$"; then
            echo "Tag $next already exists — skipping (bump package.json version to release)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "next=$next" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag.outputs.skip != 'true'
        run: |
          git tag "${{ steps.tag.outputs.next }}"
          git push origin "${{ steps.tag.outputs.next }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release for new tag
        if: steps.tag.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.next }}
          name: ${{ steps.tag.outputs.next }}
          body: "Automated release created for commit ${{ github.sha }}."
          files: copilot-plus.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
